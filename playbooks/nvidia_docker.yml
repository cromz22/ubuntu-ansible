---
- name: Configure NVIDIA Docker GPU container runtime
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    nvidia_container_toolkit_keyring_source_path: /usr/share/keyrings/nvidia-container-toolkit-keyring.asc
    nvidia_container_toolkit_keyring_path: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    nvidia_container_toolkit_packages:
      - nvidia-container-toolkit

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

  tasks:
    - name: Require supported Ubuntu distribution
      ansible.builtin.fail:
        msg: "NVIDIA Container Toolkit playbook supports Ubuntu only."
      when: ansible_distribution != "Ubuntu"

    - name: Ensure APT prerequisites are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Detect Debian architecture
      ansible.builtin.command: dpkg --print-architecture
      register: nvidia_container_toolkit_arch
      changed_when: false

    - name: Download NVIDIA Container Toolkit package signing key
      ansible.builtin.get_url:
        url: https://nvidia.github.io/libnvidia-container/gpgkey
        dest: "{{ nvidia_container_toolkit_keyring_source_path }}"
        mode: "0644"
      register: nvidia_container_toolkit_keyring_source

    - name: Check NVIDIA Container Toolkit binary keyring
      ansible.builtin.stat:
        path: "{{ nvidia_container_toolkit_keyring_path }}"
      register: nvidia_container_toolkit_keyring

    - name: Dearmor NVIDIA Container Toolkit package signing key
      ansible.builtin.command:
        argv:
          - gpg
          - --batch
          - --yes
          - --dearmor
          - --output
          - "{{ nvidia_container_toolkit_keyring_path }}"
          - "{{ nvidia_container_toolkit_keyring_source_path }}"
      when: nvidia_container_toolkit_keyring_source is changed or not nvidia_container_toolkit_keyring.stat.exists

    - name: Configure NVIDIA Container Toolkit APT repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by={{ nvidia_container_toolkit_keyring_path }}] https://nvidia.github.io/libnvidia-container/stable/deb/{{ nvidia_container_toolkit_arch.stdout }} /"
        filename: nvidia-container-toolkit
        state: present
        update_cache: true

    - name: Install NVIDIA Container Toolkit packages
      ansible.builtin.apt:
        name: "{{ nvidia_container_toolkit_packages }}"
        state: present

    - name: Ensure Docker service is started
      ansible.builtin.service:
        name: docker
        state: started

    - name: Check configured Docker runtimes
      ansible.builtin.command:
        argv:
          - docker
          - info
          - --format
          - "{{ '{{ json .Runtimes }}' }}"
      register: docker_runtime_info
      changed_when: false
      failed_when: false

    - name: Configure NVIDIA runtime for Docker
      ansible.builtin.command: nvidia-ctk runtime configure --runtime=docker
      register: nvidia_docker_runtime_configure
      changed_when: true
      when: docker_runtime_info.rc != 0 or docker_runtime_info.stdout is not search('"nvidia"')
      notify: Restart Docker
