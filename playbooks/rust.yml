- hosts: localhost
  become: false
  gather_facts: true

  vars:
    home_dir: "{{ ansible_user_dir }}"
    zshrc_path: "{{ home_dir }}/.zshrc"
    cargo_bin_dir: "{{ home_dir }}/.cargo/bin"
    rustup_home: "{{ home_dir }}/.rustup"
    rustup_bin: "{{ cargo_bin_dir }}/rustup"
    cargo_bin: "{{ cargo_bin_dir }}/cargo"

    cargo_packages:
      - package: procs
        binary: procs
      - package: git-delta
        binary: delta
      - package: difftastic
        binary: difft
      - package: tree-sitter-cli
        binary: tree-sitter

  tasks:
    - name: Show execution context
      ansible.builtin.debug:
        msg:
          - "ansible_user_id={{ ansible_user_id }}"
          - "ansible_user_dir={{ ansible_user_dir }}"
          - "ansible_env.HOME={{ ansible_env.HOME | default('unset') }}"

    - name: Install Rust (rustup)
      ansible.builtin.shell: |
        curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs | sh -s -- -y
      args:
        executable: /bin/bash
        creates: "{{ rustup_bin }}"
      environment:
        HOME: "{{ home_dir }}"
        CARGO_HOME: "{{ home_dir }}/.cargo"
        RUSTUP_HOME: "{{ rustup_home }}"

    - name: Ensure Cargo bin PATH is configured in .zshrc
      ansible.builtin.lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '^export PATH="\$HOME/\.cargo/bin:\$PATH"$'
        line: 'export PATH="$HOME/.cargo/bin:$PATH"'
        state: present
        create: true

    - name: Check clang is available for Cargo builds
      ansible.builtin.command:
        argv:
          - /bin/sh
          - -lc
          - command -v clang
      register: clang_check
      changed_when: false
      failed_when: false
      environment:
        HOME: "{{ home_dir }}"
        CARGO_HOME: "{{ home_dir }}/.cargo"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ cargo_bin_dir }}:{{ ansible_env.PATH }}"

    - name: Fail when clang is missing
      ansible.builtin.assert:
        that:
          - clang_check.rc == 0
        fail_msg: >-
          clang is required before installing Cargo packages such as tree-sitter-cli.
          Run playbooks/apt_packages.yml first to install the native build toolchain.

    - name: Install Cargo packages
      ansible.builtin.command:
        argv:
          - "{{ cargo_bin }}"
          - install
          - --locked
          - "{{ item.package }}"
      args:
        creates: "{{ cargo_bin_dir }}/{{ item.binary }}"
      loop: "{{ cargo_packages }}"
      environment:
        HOME: "{{ home_dir }}"
        CARGO_HOME: "{{ home_dir }}/.cargo"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ cargo_bin_dir }}:{{ ansible_env.PATH }}"

    - name: Verify rustc exists
      ansible.builtin.command:
        argv:
          - "{{ cargo_bin_dir }}/rustc"
          - --version
      register: rustc_version
      changed_when: false
      environment:
        HOME: "{{ home_dir }}"
        CARGO_HOME: "{{ home_dir }}/.cargo"
        RUSTUP_HOME: "{{ rustup_home }}"
        PATH: "{{ cargo_bin_dir }}:{{ ansible_env.PATH }}"

    - name: Show rustc version
      ansible.builtin.debug:
        var: rustc_version.stdout
