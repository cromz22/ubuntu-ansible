- hosts: localhost
  become: true
  gather_facts: false

  vars:
    login_user: "{{ lookup('env', 'SUDO_USER') or lookup('env', 'USER') }}"
    home_dir: "{{ '/root' if login_user == 'root' else '/home/' + login_user }}"
    fcitx5_config_dir: "{{ home_dir }}/.config/fcitx5"

  tasks:
    - name: Ensure fcitx5 config directory exists
      become_user: "{{ login_user }}"
      ansible.builtin.file:
        path: "{{ fcitx5_config_dir }}"
        state: directory
        mode: "0755"

    - name: Select fcitx5 as the input method
      become_user: "{{ login_user }}"
      ansible.builtin.command:
        argv:
          - im-config
          - -n
          - fcitx5
      environment:
        HOME: "{{ home_dir }}"
      changed_when: false

    - name: Write fcitx5 global config
      become_user: "{{ login_user }}"
      ansible.builtin.copy:
        dest: "{{ fcitx5_config_dir }}/config"
        mode: "0644"
        content: |
          [Hotkey]
          EnumerateWithTriggerKeys=True
          EnumerateSkipFirst=False
          ModifierOnlyKeyTimeout=250

          [Hotkey/TriggerKeys]

          [Hotkey/AltTriggerKeys]

          [Hotkey/EnumerateForwardKeys]

          [Hotkey/EnumerateBackwardKeys]

          [Hotkey/EnumerateGroupForwardKeys]

          [Hotkey/EnumerateGroupBackwardKeys]

          [Hotkey/ActivateKeys]
          0=Henkan

          [Hotkey/DeactivateKeys]
          0=Muhenkan

    - name: Write fcitx5 profile
      become_user: "{{ login_user }}"
      ansible.builtin.copy:
        dest: "{{ fcitx5_config_dir }}/profile"
        mode: "0644"
        content: |
          [Groups/0]
          Name=Default
          Default Layout=jp
          DefaultIM=mozc

          [Groups/0/Items/0]
          Name=keyboard-jp
          Layout=

          [Groups/0/Items/1]
          Name=mozc
          Layout=

          [GroupOrder]
          0=Default

    - name: Restart fcitx5 if running
      become_user: "{{ login_user }}"
      ansible.builtin.command:
        argv:
          - fcitx5-remote
          - -r
      environment:
        HOME: "{{ home_dir }}"
        DISPLAY: "{{ lookup('env', 'DISPLAY') }}"
        XAUTHORITY: "{{ lookup('env', 'XAUTHORITY') }}"
        DBUS_SESSION_BUS_ADDRESS: "{{ lookup('env', 'DBUS_SESSION_BUS_ADDRESS') }}"
        XDG_RUNTIME_DIR: "{{ lookup('env', 'XDG_RUNTIME_DIR') }}"
      changed_when: false
      failed_when: false
      when:
        - lookup('env', 'DISPLAY') | length > 0
