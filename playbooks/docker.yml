# Docker Engine for Ubuntu:
# https://docs.docker.com/installation/ubuntulinux/
- hosts: localhost
  become: true
  gather_facts: true

  vars:
    docker_keyring_path: /etc/apt/keyrings/docker.asc
    docker_user: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
    docker_conflicting_packages:
      - docker.io
      - docker-compose
      - docker-compose-v2
      - docker-doc
      - podman-docker
      - containerd
      - runc
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin

  tasks:
    - name: Require supported Ubuntu distribution
      ansible.builtin.fail:
        msg: "Docker Engine playbook supports Ubuntu only."
      when: ansible_distribution != "Ubuntu"

    - name: Require non-root invoking user for docker group membership
      ansible.builtin.fail:
        msg: "Run this playbook as the normal user with -K, not with sudo, so the docker group can be assigned correctly."
      when: docker_user | length == 0 or docker_user == "root"

    - name: Detect Debian architecture
      ansible.builtin.command: dpkg --print-architecture
      register: docker_arch
      changed_when: false

    - name: Check for conflicting Docker packages
      ansible.builtin.command:
        argv: "{{ ['dpkg-query', '-W', '-f=${binary:Package}\\n'] + docker_conflicting_packages }}"
      register: docker_conflicts
      changed_when: false
      failed_when: false

    - name: Require conflicting Docker packages to be removed manually
      ansible.builtin.fail:
        msg: "Remove conflicting packages before installing Docker Engine from Docker's official repository: {{ docker_conflicts.stdout_lines | join(', ') }}"
      when: docker_conflicts.stdout_lines | length > 0

    - name: Ensure Docker APT prerequisites are installed
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
        state: present
        update_cache: true

    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker package signing key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: "{{ docker_keyring_path }}"
        mode: "0644"

    - name: Configure Docker APT repository
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch.stdout }} signed-by={{ docker_keyring_path }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        filename: docker
        state: present
        update_cache: true

    - name: Install Docker Engine packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Ensure Docker service is enabled and started
      ansible.builtin.service:
        name: docker
        enabled: true
        state: started

    - name: Add invoking user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true
