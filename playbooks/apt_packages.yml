- hosts: localhost
  become: true
  gather_facts: false

  vars:
    home_dir: "{{ lookup('env', 'HOME') }}"
    local_bin_dir: "{{ home_dir }}/.local/bin"
    zshrc_path: "{{ home_dir }}/.zshrc"

  tasks:
    - name: Install packages
      apt:
        name:
          - build-essential
          - ca-certificates
          - clang
          - cmake
          - curl
          - emacs-nox
          - fd-find
          - fcitx5
          - fcitx5-config-qt
          - fcitx5-frontend-gtk3
          - fcitx5-frontend-gtk4
          - fcitx5-mozc
          - git
          - gnupg
          - htop
          - im-config
          - lsb-release
          - ripgrep
          - tmux
          - vim
          - xclip
          - zsh
        state: present
        update_cache: true

    - name: Ensure local bin directory exists
      become: false
      file:
        path: "{{ local_bin_dir }}"
        state: directory
        mode: "0755"

    - name: Ensure local bin PATH is configured in .zshrc
      become: false
      lineinfile:
        path: "{{ zshrc_path }}"
        regexp: '(^|:){{ home_dir }}/\.local/bin(:|$)|\.local/bin'
        line: 'export PATH="$HOME/.local/bin:$PATH"'
        state: present
        create: true

    - name: Provide fd command from Debian's fdfind package
      become: false
      file:
        src: /usr/bin/fdfind
        dest: "{{ local_bin_dir }}/fd"
        state: link
