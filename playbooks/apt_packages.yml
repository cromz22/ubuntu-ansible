- hosts: localhost
  become: true

  tasks:
    - name: Install packages
      apt:
        name:
          - build-essential
          - cmake
          - curl
          - fd-find
          - fcitx5
          - fcitx5-config-qt
          - fcitx5-frontend-gtk3
          - fcitx5-frontend-gtk4
          - fcitx5-mozc
          - git
          - htop
          - im-config
          - ripgrep
          - tmux
          - vim
          - xclip
          - zsh
        state: present
        update_cache: true
