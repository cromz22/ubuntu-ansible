- hosts: localhost
  become: true
  gather_facts: false

  tasks:
    - name: Install desktop-only packages
      apt:
        name:
          - fcitx5
          - fcitx5-config-qt
          - fcitx5-frontend-gtk3
          - fcitx5-frontend-gtk4
          - fcitx5-mozc
          - im-config
          - xclip
        state: present
        update_cache: true
