- hosts: localhost
  become: true
  gather_facts: false

  vars:
    slack_deb_version: 4.47.69
    slack_deb_url: https://downloads.slack-edge.com/desktop-releases/linux/x64/4.47.69/slack-desktop-4.47.69-amd64.deb
    wezterm_keyring_source_path: /tmp/wezterm-fury.gpg.key
    wezterm_keyring_path: /usr/share/keyrings/wezterm-fury.gpg

  tasks:
    - name: Ensure desktop APT prerequisites are installed
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: true

    - name: Download WezTerm package signing key
      get_url:
        url: https://apt.fury.io/wez/gpg.key
        dest: "{{ wezterm_keyring_source_path }}"
        mode: "0644"
      register: wezterm_keyring_source

    - name: Check WezTerm binary keyring
      stat:
        path: "{{ wezterm_keyring_path }}"
      register: wezterm_keyring

    - name: Dearmor WezTerm package signing key
      command:
        argv:
          - gpg
          - --batch
          - --yes
          - --dearmor
          - --output
          - "{{ wezterm_keyring_path }}"
          - "{{ wezterm_keyring_source_path }}"
      when: wezterm_keyring_source is changed or not wezterm_keyring.stat.exists

    - name: Configure WezTerm APT repository
      apt_repository:
        repo: "deb [signed-by={{ wezterm_keyring_path }}] https://apt.fury.io/wez/ * *"
        filename: wezterm
        state: present
        update_cache: true

    - name: Install desktop-only packages
      apt:
        name:
          - fcitx5
          - fcitx5-config-qt
          - fcitx5-frontend-gtk3
          - fcitx5-frontend-gtk4
          - fcitx5-mozc
          - im-config
          - wezterm
          - xclip
        state: present

    - name: Remove Slack snap package
      community.general.snap:
        name: slack
        state: absent

    - name: Check installed Slack deb package version
      command: dpkg-query -W -f=${Version} slack-desktop
      register: slack_deb_installed
      changed_when: false
      failed_when: false

    - name: Install Slack from official deb package
      apt:
        deb: "{{ slack_deb_url }}"
        state: present
      when: >
        slack_deb_installed.rc != 0 or
        slack_deb_installed.stdout is version(slack_deb_version, '<')
